server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # ─── Security headers ──────────────────────────────────────────────
    # Applied with `always` so they also fire on error responses (nginx
    # strips regular add_header directives from non-2xx by default).
    #
    # CSP notes — dashboard runtime needs:
    #   connect-src 'self' ws: wss:   (axios + socket.io, same-origin)
    #   img-src 'self' data:           (QR codes / inline SVGs)
    #   style-src 'self' 'unsafe-inline' (Tailwind emits inline styles at build,
    #                                     but Vite chunk loaders also inject
    #                                     runtime <style> tags on HMR — we're
    #                                     built production so that's moot, but
    #                                     lucide-react sets inline style attrs)
    #   script-src 'self'              (no CDN, no inline <script>)
    # If you add a CDN font/asset, extend the relevant directive rather
    # than going to 'unsafe-*'.
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self' data:; connect-src 'self' ws: wss:; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;

    # Proxy API requests to backend
    location /api/ {
        proxy_pass http://backend:8000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 60s;
    }

    # Proxy Socket.io
    location /socket.io/ {
        proxy_pass http://backend:8000/socket.io/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 86400s;
    }

    # SPA fallback — all non-asset routes go to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets
    location ~* \.(js|css|png|jpg|svg|ico|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # Don't leak nginx version in error pages / Server header
    server_tokens off;

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;
}
