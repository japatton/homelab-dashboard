version: 2

# Dependency update automation. Weekly cadence keeps the PR noise manageable
# while still catching CVE-relevant bumps within ~7 days.

updates:
  # Backend — pip
  - package-ecosystem: pip
    directory: /backend
    schedule:
      interval: weekly
      day: monday
      time: "07:00"
      timezone: "UTC"
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - backend
    commit-message:
      prefix: "pip"
      include: scope
    groups:
      # Cluster routine patch/minor bumps into a single weekly PR. Security
      # updates and major versions still open their own PRs.
      minor-and-patch:
        update-types:
          - minor
          - patch

  # Frontend — npm
  - package-ecosystem: npm
    directory: /frontend
    schedule:
      interval: weekly
      day: monday
      time: "07:00"
      timezone: "UTC"
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - frontend
    commit-message:
      prefix: "npm"
      include: scope
    groups:
      minor-and-patch:
        update-types:
          - minor
          - patch
      # Keep the React ecosystem grouped — they almost always ship in sync.
      react:
        patterns:
          - "react"
          - "react-dom"
          - "@types/react"
          - "@types/react-dom"

  # GitHub Actions themselves
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "07:00"
      timezone: "UTC"
    open-pull-requests-limit: 3
    labels:
      - dependencies
      - ci
    commit-message:
      prefix: "actions"
      include: scope

  # Docker base images
  #
  # Pinning policy: stay on the current LTS-equivalent line. Dependabot will
  # propose patch/security bumps on the same major (e.g. python:3.12.x) but
  # we ignore major and minor bumps so we don't get pulled onto pre-release
  # or odd-numbered release lines (Python 3.14 pre-release, Node 25 non-LTS).
  # When we're ready to move to a new line, bump the FROM tag manually and
  # the patch updates resume on the new major.
  - package-ecosystem: docker
    directory: /backend
    schedule:
      interval: weekly
      day: monday
      time: "07:00"
      timezone: "UTC"
    open-pull-requests-limit: 3
    labels:
      - dependencies
      - docker
    commit-message:
      prefix: "docker(backend)"
    ignore:
      # Stay on Python 3.12.x line. 3.13 is current; 3.14 is pre-release.
      # Re-evaluate yearly once a new line reaches "stable" status.
      - dependency-name: "python"
        update-types:
          - "version-update:semver-major"
          - "version-update:semver-minor"

  - package-ecosystem: docker
    directory: /frontend
    schedule:
      interval: weekly
      day: monday
      time: "07:00"
      timezone: "UTC"
    open-pull-requests-limit: 3
    labels:
      - dependencies
      - docker
    commit-message:
      prefix: "docker(frontend)"
    ignore:
      # Stay on Node LTS (even-numbered majors). Don't follow odd majors like
      # 21/23/25 which are short-lived "Current" releases.
      - dependency-name: "node"
        update-types:
          - "version-update:semver-major"
