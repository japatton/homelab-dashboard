name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-flight runs on the same ref when a new push arrives.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Default GITHUB_TOKEN scope for every job. CodeQL flags missing
# permissions blocks (rule: actions/missing-workflow-permissions); the
# read-only default here narrows the blast radius if any step (or one
# of its transitive deps) is ever compromised. Individual jobs override
# below when they need write scopes (e.g. docker-build needs
# `actions: write` for the GHA Docker layer cache).
permissions:
  contents: read

jobs:
  backend:
    name: Backend — lint + type-check + tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            backend/requirements.txt
            backend/requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Ruff (lint)
        run: ruff check .

      - name: Ruff (format check)
        run: ruff format --check .

      - name: Mypy (type check)
        # Non-blocking for now — the codebase isn't fully annotated. Flip to
        # `continue-on-error: false` once we reach mypy-strict parity.
        run: mypy --install-types --non-interactive . || true
        continue-on-error: true

      - name: Pytest
        env:
          BACKEND_MOCK: "true"
          DB_PATH: /tmp/ci-test.db
        run: pytest --cov=. --cov-report=term --cov-report=xml

      - name: Upload coverage
        uses: actions/upload-artifact@v7
        with:
          name: backend-coverage
          path: backend/coverage.xml
          if-no-files-found: ignore

  frontend:
    name: Frontend — lint + type-check + build + tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: ESLint
        run: npm run lint

      - name: TypeScript (noEmit)
        run: npx tsc --noEmit -p .

      - name: Vitest
        run: npm test -- --run --coverage

      - name: Vite build
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: frontend-dist
          path: frontend/dist
          if-no-files-found: error

  docker-build:
    name: Docker — backend + frontend image build smoke test
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    # docker/build-push-action's `cache-to: type=gha` writes layers to
    # the GitHub Actions cache, which requires actions:write. contents:
    # read is the standard checkout permission. Both narrowly scoped.
    permissions:
      contents: read
      actions: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: false
          tags: homelab-dashboard-backend:ci
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

      - name: Build frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: false
          tags: homelab-dashboard-frontend:ci
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend
