[pytest]
# Pytest config. Invoked from the backend/ directory:
#   cd backend && pytest
#
# We add the backend/ root to sys.path via the conftest so tests can do
# plain `from services.alarm_service import ...` — matching how the
# runtime code imports its peers. No need for `backend.` package prefix.

testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Async fixtures / tests use pytest-asyncio in "auto" mode so individual
# `async def test_x()` functions don't need a decorator.
asyncio_mode = auto
# Pin the default fixture loop scope to function — one fresh event loop
# per test, no cross-test state leakage from shared fixtures. Also
# silences pytest-asyncio's default-scope deprecation warning.
asyncio_default_fixture_loop_scope = function

# Ignore the venv + mock fixtures as test sources even if a stray
# test_*.py lands there. Strict collection keeps CI output readable.
norecursedirs = .venv __pycache__ mock

# Surface deprecation warnings — keeps us honest about pydantic v2 / httpx
# deprecations as they appear upstream. Flip to `error` once the runtime
# is clean.
filterwarnings =
    default::DeprecationWarning
    default::PendingDeprecationWarning

addopts =
    -ra
    --strict-markers
    --strict-config

markers =
    integration: tests that touch real services (skipped by default in CI)
